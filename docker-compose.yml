version: '3.8'

services:
  vue-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - traefik-public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vue-app.rule=Host(`osaz.si`)"
      - "traefik.http.routers.vue-app.entrypoints=websecure"
      - "traefik.http.routers.vue-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.vue-app.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
