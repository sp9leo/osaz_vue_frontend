version: '3.8'

services:
  vue-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_FRAPPE_URL=https://muri.osaz.si
      - VITE_FRAPPE_API_KEY=22814cf7e914d0a
      - VITE_FRAPPE_API_SECRET=141ec7d4d49e850
    networks:
      - traefik-public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vue-app.rule=Host(`osaz.si`)"
      - "traefik.http.routers.vue-app.entrypoints=websecure"
      - "traefik.http.routers.vue-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.vue-app.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
